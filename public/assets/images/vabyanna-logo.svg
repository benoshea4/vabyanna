<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" role="img" aria-label="VA by Anna">
  <title>VA by Anna</title>

  <!-- Circle Badge -->
  <circle cx="28" cy="28" r="25" fill="#178f79"/>
  <!-- Inner ring -->
  <circle cx="28" cy="28" r="21.5" fill="none" stroke="white" stroke-width="0.75" opacity="0.45"/>

  <!-- Decorative rule above VA -->
  <line x1="16" y1="16.5" x2="40" y2="16.5" stroke="white" stroke-width="0.75" stroke-linecap="round" opacity="0.65"/>
  <circle cx="16" cy="16.5" r="1.3" fill="white" opacity="0.65"/>
  <circle cx="40" cy="16.5" r="1.3" fill="white" opacity="0.65"/>

  <!-- VA Text -->
  <text x="28" y="35"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="21" font-weight="700"
    text-anchor="middle"
    fill="white"
    letter-spacing="3">VA</text>

  <!-- Decorative rule below VA -->
  <line x1="16" y1="40.5" x2="40" y2="40.5" stroke="white" stroke-width="0.75" stroke-linecap="round" opacity="0.65"/>
  <circle cx="16" cy="40.5" r="1.3" fill="white" opacity="0.65"/>
  <circle cx="40" cy="40.5" r="1.3" fill="white" opacity="0.65"/>

  <!-- Brand Name -->
  <text x="62" y="34"
    font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
    font-size="22" font-weight="600"
    fill="#178f79"
    letter-spacing="-0.5">by Anna</text>
</svg>
