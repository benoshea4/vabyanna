<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>Page Not Found - VA by Anna</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body data-page="404">
    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <a href="/" aria-label="VA by Anna - Home">
                        <img src="/assets/images/vabyanna-logo.svg" alt="VA by Anna" width="157" height="40" loading="eager">
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="main" id="main-content">
        <div class="container">
            <section class="error-section">
                <h1 class="error-code">404</h1>
                <h2 class="section-title">Page Not Found</h2>
                <p class="error-message">Sorry, the page you're looking for doesn't exist or has been moved.</p>
                <div class="button-group">
                    <a href="/" class="btn btn-primary">Go Home</a>
                    <a href="/contact.html" class="btn btn-outline">Contact Anna</a>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <p class="copyright">&copy; 2026 VA by Anna. All rights reserved.</p>
                </div>
            </div>
        </div>
    </footer>
    <script src="/assets/js/main.js" defer></script>
</body>
</html>
